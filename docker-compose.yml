version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    tty: false
    stdin_open: false
    # No user override — postgres init uses gosu (root → postgres) which needs the default caps
    # No cap_drop — startup requires CHOWN / SETUID / SETGID
    # No read_only — must write to the data volume
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: sitescanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scannerpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d sitescanner"]
      interval: 5s
      timeout: 5s
      retries: 10
    pids_limit: 200
    mem_limit: 1g
    cpus: "1"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    tty: false
    stdin_open: false
    security_opt:
      - no-new-privileges:true
    # cap_drop omitted — redis entrypoint uses su-exec (setuid) to drop to redis user
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    pids_limit: 100
    mem_limit: 256m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/api/server.js
    restart: unless-stopped
    user: "1000:1000"
    tty: false
    stdin_open: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://scanner:${POSTGRES_PASSWORD:-scannerpassword}@postgres:5432/sitescanner
      REDIS_URL: redis://redis:6379
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SSRF_PROTECTION: ${SSRF_PROTECTION:-true}
      MAX_SCAN_URLS: ${MAX_SCAN_URLS:-500}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-http://localhost:11434/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 256
    mem_limit: 512m
    cpus: "1"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/worker/worker.js
    restart: unless-stopped
    user: "1000:1000"
    tty: false
    stdin_open: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # read_only intentionally omitted — Playwright writes temp browser profiles to /tmp
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://scanner:${POSTGRES_PASSWORD:-scannerpassword}@postgres:5432/sitescanner
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-30000}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-15000}
      MAX_WARM_ATTEMPTS: ${MAX_WARM_ATTEMPTS:-5}
      WARM_DELAY_MS: ${WARM_DELAY_MS:-500}
      SSRF_PROTECTION: ${SSRF_PROTECTION:-true}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-http://localhost:11434/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    pids_limit: 512
    mem_limit: 2g
    cpus: "2"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    tty: false
    stdin_open: false
    # nginx master binds :80 (privileged port) — keep root but drop all other caps
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # bind port 80 (privileged)
      - CHOWN              # chown cache temp dirs on startup
      - SETUID             # master → worker privilege drop
      - SETGID             # master → worker privilege drop
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=8m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=64m
    ports:
      - "3000:80"
    depends_on:
      - api
    pids_limit: 50
    mem_limit: 128m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
